{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4>Projects</h4>
    <span class="text-muted">Manage your team work efficiently</span>
</div>

<div class="row">
    {% for project in projects %}
    <div class="col-md-4 mb-4">
        <div class="card p-3">
            <h5>{{ project.name }}</h5>
            <p class="text-muted small">{{ project.description }}</p>

            <div class="d-flex justify-content-between align-items-center mt-3">
                <small class="text-muted">Owner: {{ project.owner }}</small>
                <a href="/projects/{{ project.id }}/" class="btn btn-sm btn-primary">
                    View
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
